name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            goos: 'windows'
            goarch: 'amd64'
            sidecar_name: 'rayflowd-x86_64-pc-windows-msvc.exe'
          - platform: 'macos-latest'
            goos: 'darwin'
            goarch: 'universal'
          - platform: 'ubuntu-latest'
            goos: 'linux'
            goarch: 'amd64'
            sidecar_name: 'rayflowd-x86_64-unknown-linux-gnu'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Desktop Dependencies
        run: |
          cd apps/desktop
          npm ci
        shell: bash

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Create Sidecar Directory
        run: mkdir -p apps/desktop/src-tauri/bin
        shell: bash

      - name: Build Go Sidecar (Windows & Linux)
        if: matrix.goarch != 'universal'
        run: |
          cd apps/backend
          go build -o ../desktop/src-tauri/bin/${{ matrix.sidecar_name }} cmd/rayflowd/main.go
        shell: bash

      - name: Build Go Sidecars (macOS Universal)
        if: matrix.goarch == 'universal'
        run: |
          cd apps/backend
          GOOS=darwin GOARCH=amd64 go build -o ../desktop/src-tauri/bin/rayflowd-x86_64-apple-darwin cmd/rayflowd/main.go
          GOOS=darwin GOARCH=arm64 go build -o ../desktop/src-tauri/bin/rayflowd-aarch64-apple-darwin cmd/rayflowd/main.go
        shell: bash

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
        shell: bash

      - name: Build Tauri Desktop Shell
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'RayFlow Client ${{ github.ref_name }}'
          projectPath: apps/desktop
